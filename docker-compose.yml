services:
  tierra:
    build:
      context: .
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
        VITE_ADMIN_PIN: ${VITE_ADMIN_PIN}
    container_name: tierra-app
    restart: unless-stopped
    ports:
      - "3002:3002"
    env_file:
      # Provides the runtime env: VITE_* (also needed at runtime by server functions),
      # SUPABASE_SERVICE_ROLE_KEY, ADMIN_EMAIL, ADMIN_PASSWORD.
      - .env
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=3002
